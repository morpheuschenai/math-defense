<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 數學塔防</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f23;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      user-select: none;
    }
    #wrap { position: relative; }
    canvas {
      display: block;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(255,215,0,0.25);
    }

    /* ── Question bar (always visible during wave, bottom strip) ── */
    #qBar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #0e0e30;
      border-top: 3px solid #ffd700;
      border-radius: 0 0 12px 12px;
      padding: 10px 16px 12px;
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 20;
    }
    #qBar.show { display: flex; }

    #qLabel {
      color: #aaccff;
      font-size: 12px;
      font-family: sans-serif;
      text-align: center;
      flex-shrink: 0;
      width: 72px;
      line-height: 1.4;
    }
    #qExpr {
      color: #ffd700;
      font-size: 44px;
      font-weight: bold;
      font-family: sans-serif;
      letter-spacing: 2px;
      flex-shrink: 0;
      min-width: 180px;
      text-align: center;
    }
    #qChoices { display: flex; gap: 8px; flex-shrink: 0; }
    .qBtn {
      background: #3a3a7a;
      border: 3px solid #6666bb;
      border-radius: 14px;
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      font-family: sans-serif;
      width: 76px; height: 76px;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
    }
    .qBtn:hover:not(:disabled) { background: #5555aa; transform: scale(1.08); }
    .qBtn.correct { background: #1a8a3a !important; border-color: #44ff77 !important; }
    .qBtn.wrong   { background: #8a1a1a !important; border-color: #ff4444 !important; }
    .qBtn:disabled { cursor: default; }

    #qRight {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    #qFeedback {
      color: #fff;
      font-size: 16px;
      font-family: sans-serif;
      height: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #qTimerWrap {
      height: 8px;
      background: #2a2a4a;
      border-radius: 4px;
      overflow: hidden;
    }
    #qTimerBar {
      height: 100%;
      background: linear-gradient(90deg,#ffd700,#ff8800);
      border-radius: 4px;
      width: 100%;
      transition: width 0.12s linear;
    }

    /* ── Build / upgrade panel ── */
    #panel {
      position: absolute;
      background: #1a1a42;
      border: 2px solid #ffd700;
      border-radius: 14px;
      padding: 10px 12px;
      display: none;
      z-index: 30;
      min-width: 230px;
      font-family: sans-serif;
    }
    #panel.show { display: block; }
    #panel h3 { color: #ffd700; font-size: 13px; text-align: center; margin-bottom: 8px; }

    .bOpt {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 8px;
      cursor: pointer; color: #fff; font-size: 13px;
    }
    .bOpt:hover { background: #3a3a7a; }
    .bOpt .bCost { color: #ffd700; margin-left: auto; }
    .bOpt .bStats { font-size: 11px; color: #aaaacc; display: block; margin-top: 1px; }
    .bOpt.poor { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .bOpt.cancel { border-top: 1px solid #444; margin-top: 6px; padding-top: 8px; }

    /* upgrade rows */
    .upRow {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 4px; border-radius: 8px;
    }
    .upRow:hover { background: #2a2a5a; }
    .upAttr {
      font-size: 12px; color: #ddd; width: 66px; flex-shrink: 0;
      white-space: nowrap;
    }
    .upIcons { flex: 1; font-size: 13px; line-height: 1; }
    .upBtn {
      background: #3a3a7a; border: 2px solid #5555aa;
      border-radius: 7px; color: #ffd700;
      font-size: 11px; padding: 3px 8px;
      cursor: pointer; white-space: nowrap; font-family: sans-serif;
    }
    .upBtn:hover:not(.maxed):not(.poor) { background: #5555aa; }
    .upBtn.maxed { background: #222; border-color: #444; color: #666; cursor: default; }
    .upBtn.poor  { opacity: 0.45; cursor: not-allowed; }

    #gameControls {
      position: absolute;
      top: 58px;
      right: 8px;
      display: flex;
      gap: 6px;
      z-index: 35;
      align-items: flex-start;
    }
    .ctrlWrap {
      position: relative;
    }
    .ctrlIconBtn {
      width: 42px;
      height: 42px;
      border: 2px solid #6666bb;
      background: rgba(28,28,66,0.92);
      color: #f4f4ff;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font: 22px sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.28);
    }
    .ctrlIconBtn.active,
    .ctrlIconBtn:hover {
      border-color: #ffd700;
      color: #ffd700;
      background: #3b3b7c;
    }
    .ctrlBadge {
      position: absolute;
      right: -4px;
      bottom: -4px;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #ffd700;
      color: #231b06;
      font: bold 11px sans-serif;
      border: 2px solid #1d1d49;
      pointer-events: none;
    }
    .ctrlMenu {
      position: absolute;
      top: 50px;
      right: 0;
      min-width: 220px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(21,21,51,0.96);
      border: 2px solid #6767c4;
      box-shadow: 0 18px 30px rgba(0,0,0,0.32);
      display: none;
    }
    .ctrlMenu.show { display: block; }
    .ctrlMenuTitle {
      color: #ffd700;
      font: bold 13px sans-serif;
      margin-bottom: 8px;
    }
    .ctrlOption {
      width: 100%;
      border: 2px solid #4d4da2;
      background: #29295f;
      color: #e8e8ff;
      font: 13px sans-serif;
      border-radius: 10px;
      padding: 8px 10px;
      margin-top: 6px;
      text-align: left;
      cursor: pointer;
    }
    .ctrlOption:first-of-type { margin-top: 0; }
    .ctrlOption.active {
      border-color: #ffd700;
      color: #ffd700;
      background: #473814;
    }
    .ctrlOption small {
      display: block;
      color: #aeb4ff;
      margin-top: 2px;
      font-size: 11px;
      line-height: 1.35;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      background: rgba(0,0,0,0.62);
      font-family: sans-serif;
    }
    #overlay.show { display: flex; }
    #dialog {
      width: 540px;
      max-width: calc(100% - 24px);
      border-radius: 16px;
      background: #1a1a42;
      border: 3px solid #ffd700;
      padding: 16px;
      color: #f3f3ff;
    }
    #dialog h2 {
      text-align: center;
      color: #ffd700;
      margin-bottom: 10px;
      font-size: 24px;
    }
    #dialog p { line-height: 1.45; margin: 6px 0; font-size: 14px; }
    #dialog .heroCard {
      border: 1px solid #4f4f8e;
      border-radius: 10px;
      padding: 8px;
      margin-top: 10px;
      background: rgba(255,255,255,0.03);
    }
    #dialog .ctaRow {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .dlgBtn {
      border: 2px solid #6f6fff;
      background: #363676;
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font: bold 14px sans-serif;
      cursor: pointer;
    }
    .dlgBtn.primary {
      border-color: #ffd700;
      color: #ffd700;
      background: #4a3b16;
    }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="gameControls">
    <div class="ctrlWrap">
      <button id="speedToggleBtn" class="ctrlIconBtn" type="button" aria-label="遊戲速度">⏰</button>
      <span id="speedBadge" class="ctrlBadge">1.0x</span>
      <div id="speedMenu" class="ctrlMenu" role="dialog" aria-label="選擇遊戲速度">
        <div class="ctrlMenuTitle">遊戲速度</div>
        <button class="ctrlOption active" data-speed="1" type="button">1.0x<small>預設速度</small></button>
        <button class="ctrlOption" data-speed="1.5" type="button">1.5x<small>加快推進</small></button>
        <button class="ctrlOption" data-speed="2" type="button">2.0x<small>快速遊玩</small></button>
      </div>
    </div>
    <div class="ctrlWrap">
      <button id="difficultyToggleBtn" class="ctrlIconBtn" type="button" aria-label="遊戲難度">🎯</button>
      <span id="difficultyBadge" class="ctrlBadge">LV1</span>
      <div id="difficultyMenu" class="ctrlMenu" role="dialog" aria-label="選擇遊戲難度">
        <div class="ctrlMenuTitle">題目等級</div>
        <button class="ctrlOption active" data-difficulty="1" type="button">LV1<small>連對 5 題，答對 +8 金幣</small></button>
        <button class="ctrlOption" data-difficulty="2" type="button">LV2<small>連對 6 題，答對 +9 金幣</small></button>
        <button class="ctrlOption" data-difficulty="3" type="button">LV3<small>連對 7 題，答對 +10 金幣</small></button>
        <button class="ctrlOption" data-difficulty="4" type="button">LV4<small>連對 8 題，答對 +11 金幣</small></button>
      </div>
    </div>
  </div>

  <!-- Always-on question bar during wave -->
  <div id="qBar">
    <div id="qLabel">💡答題<br>賺金幣</div>
    <div id="qExpr">5 + 3 = ?</div>
    <div id="qChoices">
      <button class="qBtn" data-i="0">8</button>
      <button class="qBtn" data-i="1">9</button>
      <button class="qBtn" data-i="2">7</button>
    </div>
    <div id="qRight">
      <div id="qFeedback"></div>
      <div id="qTimerWrap"><div id="qTimerBar"></div></div>
    </div>
  </div>

  <div id="panel"></div>
  <div id="overlay">
    <div id="dialog"></div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════
const CW = 800, CH = 600, HUD = 50, CELL = 40;
const Q_SECS = 14;
const Q_BAR_H = 110; // approx height of question bar (for game area calc)

const WP = [
  {x:-40,  y:200},
  {x:200,  y:200},
  {x:200,  y:400},
  {x:600,  y:400},
  {x:600,  y:200},
  {x:840,  y:200},
];

const TOWER_DEFS = {
  cat:  {name:'貓咪塔', emoji:'🐱', cost:50,  range:130, damage:1, atkCD:2.0, color:'#ffaa55', bClr:'#ffee00', bSpd:280},
  dino: {name:'恐龍塔', emoji:'🦕', cost:80,  range:145, damage:2, atkCD:2.8, color:'#66ee88', bClr:'#aaff44', bSpd:230},
  star: {name:'魔法星塔',emoji:'⭐', cost:120, range:160, damage:1, atkCD:2.2, color:'#ffff55', bClr:'#ffffff', bSpd:250, aoe:true},
};

// Upgrade: cost to go from level N → N+1 (index = current level 0..4)
const UPG_COST = [25, 50, 85, 130, 190];
const MAX_UPG  = 5;
const UPG_DMG  = 1;      // +damage per level
const UPG_RNG  = 18;     // +range per level
const UPG_SPD  = 0.22;   // -cooldown per level (min 0.4s)

// Icons for each upgrade attribute (filled vs dim)
const UPG_ICONS = {damage:'⚔️', speed:'🏃', range:'🎯'};
const LOOT_DROP_RATE = 0.05;
const LOOT_ATTRS = ['damage','speed','range'];
const LOOT_ATTR_LABELS = {damage:'傷害', speed:'速度', range:'射程'};

const QUESTION_LEVELS = [
  null,
  {id:1, label:'LV1', goal:5, reward:8},
  {id:2, label:'LV2', goal:6, reward:9},
  {id:3, label:'LV3', goal:7, reward:10},
  {id:4, label:'LV4', goal:8, reward:11},
];

// ════════════════════════════════════════════════════════
// INFINITE WAVE GENERATION
// ════════════════════════════════════════════════════════
function isBossWave(idx) { return (idx+1) % 5 === 0; }

function getWaveConfig(idx) {
  const w = idx+1;
  if (isBossWave(idx)) {
    const mc = 2 + Math.floor(w/4);
    return {
      isBoss:true, totalCount:1+mc,
      bossHp:Math.floor(20+w*7), bossSpeed:22,
      minionHp:Math.max(1,Math.floor(w*0.6)),
      minionSpeed:Math.min(95,28+w*2),
      minionCount:mc, interval:1.6,
    };
  }
  return {
    isBoss:false,
    totalCount:4+Math.floor(w*1.8),
    hp:Math.max(1,Math.floor(1+Math.floor(w*0.9))),
    speed:Math.min(100,28+w*2.2),
    interval:Math.max(0.7,2.5-w*0.07),
  };
}

// ════════════════════════════════════════════════════════
// CANVAS
// ════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function segDist(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy;if(!l)return Math.hypot(px-ax,py-ay);const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l));return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));}
function onPath(cx,cy){for(let i=0;i<WP.length-1;i++)if(segDist(cx,cy,WP[i].x,WP[i].y,WP[i+1].x,WP[i+1].y)<38)return true;return false;}

// Render upgrade icons: filled + dim for remaining levels
function upIcons(attr, level) {
  const ic = UPG_ICONS[attr];
  const filled = level > 0 ? ic.repeat(level) : '';
  const empty  = level < MAX_UPG
    ? `<span style="opacity:0.18">${ic.repeat(MAX_UPG-level)}</span>` : '';
  return filled + empty;
}

function sample(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function makeLootReward(){
  const roll=Math.random();
  if(roll<0.5)return {kind:'coins', amount:rnd(1,100)};
  if(roll<0.9)return {kind:'upgrade', attr:sample(LOOT_ATTRS)};
  return {kind:'maxCat'};
}

function lootRewardText(reward){
  if(!reward)return '';
  if(reward.kind==='coins')return `🪙 金幣 +${reward.amount}`;
  if(reward.kind==='upgrade')return `🎟️ ${LOOT_ATTR_LABELS[reward.attr]}升級券`;
  return '🐱 滿級貓咪塔';
}

function lootRewardDetail(reward){
  if(!reward)return '';
  if(reward.kind==='coins')return `按下使用後，立即獲得 ${reward.amount} 金幣`;
  if(reward.kind==='upgrade')return `按下使用後，選擇地圖上任一座塔，將 ${LOOT_ATTR_LABELS[reward.attr]} 提升 1 級`;
  return '按下使用後，可在地圖空地部署一座三項屬性都滿級的貓咪塔';
}

function applyTowerUpgrade(tower,attr,levels=1){
  if(!tower||!attr)return false;
  const before=tower.upgrades[attr];
  tower.upgrades[attr]=Math.min(MAX_UPG,tower.upgrades[attr]+levels);
  return tower.upgrades[attr]>before;
}

function applyHeroUpgrade(hero,attr,levels=1){
  if(!hero||!attr)return false;
  const key=attr==='damage'?'attack':attr;
  if(!(key in hero.attrs))return false;
  hero.attrs[key]+=levels;
  return true;
}

// ════════════════════════════════════════════════════════
// MATH QUESTION GENERATOR
// ════════════════════════════════════════════════════════
function getQuestionLevelMeta(level){return QUESTION_LEVELS[Math.max(1,Math.min(4,level))];}
function pickQuestionTier(level){return rnd(1,Math.max(1,Math.min(4,level)));}

function makeLv1Question(){
  let a=0,b=0;
  do{
    a=rnd(0,9);
    b=rnd(0,9);
  }while(a+b>=10 || (a===0&&b===0));
  return {a,b,op:'+'};
}

function makeLv2Question(){
  let a=rnd(0,10),b=rnd(0,10),op=Math.random()<0.5?'+':'-';
  if(op==='-'&&b>a)[a,b]=[b,a];
  if(a===0&&b===0){a=1;}
  return {a,b,op};
}

function makeCarryQuestion(needsCarry){
  let a,b;
  do{
    const aT=rnd(1,9), bT=rnd(1,9);
    const aO=rnd(0,9), bO=rnd(0,9);
    a=aT*10+aO;
    b=bT*10+bO;
  }while((a%10+b%10>=10)!==needsCarry || a+b>=100);
  return {a,b,op:'+'};
}

function makeQuestion(level) {
  const tier=pickQuestionTier(level);
  const spec = tier===1 ? makeLv1Question()
    : tier===2 ? makeLv2Question()
    : tier===3 ? makeCarryQuestion(false)
    : makeCarryQuestion(true);
  const {a,b,op}=spec;
  const ans=op==='+'?a+b:a-b;
  const offs=shuffle([-3,-2,-1,1,2,3]);
  const wr=[];
  for(const o of offs){
    const w=ans+o;
    if(w>=0&&w<=99&&w!==ans&&!wr.includes(w))wr.push(w);
    if(wr.length===2)break;
  }
  while(wr.length<2){
    const w=Math.max(0,Math.min(99,ans+(wr.length===0?4:-4)));
    if(w!==ans&&!wr.includes(w))wr.push(w);
  }
  const choices=shuffle([ans,wr[0],wr[1]]);
  return{expr:`${a} ${op} ${b} = ?`,ans,choices,ci:choices.indexOf(ans),tier};
}

// ════════════════════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════════════════════
let particles=[];
class Particle{
  constructor(x,y,vx,vy,color,life,r){Object.assign(this,{x,y,vx,vy,color,life,maxLife:life,r:r||rnd(3,7)});}
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vy+=100*dt;this.life-=dt;}
  draw(){const a=Math.max(0,this.life/this.maxLife);ctx.save();ctx.globalAlpha=a;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.r*a,0,Math.PI*2);ctx.fill();ctx.restore();}
}
function burst(x,y,colors,n){
  for(let i=0;i<n;i++){const ang=Math.random()*Math.PI*2,spd=rnd(60,200);
    particles.push(new Particle(x,y,Math.cos(ang)*spd,Math.sin(ang)*spd-60,colors[Math.floor(Math.random()*colors.length)],0.8+Math.random()*0.4));}
}

let floatTexts=[];
class FloatText{
  constructor(x,y,text,color='#ffe680'){
    Object.assign(this,{x,y,text,color,life:0.9,maxLife:0.9});
  }
  update(dt){
    this.y-=30*dt;
    this.life-=dt;
  }
  draw(){
    const a=Math.max(0,this.life/this.maxLife);
    ctx.save();
    ctx.globalAlpha=a;
    ctx.fillStyle=this.color;
    ctx.font='bold 26px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.shadowColor=this.color;
    ctx.shadowBlur=14;
    ctx.fillText(this.text,this.x,this.y);
    ctx.restore();
  }
}

function showFloatText(x,y,text,color){
  floatTexts.push(new FloatText(x,y,text,color));
}

// ════════════════════════════════════════════════════════
// ENEMY
// ════════════════════════════════════════════════════════
class Enemy{
  constructor(hp,speed,isBoss=false){
    this.x=WP[0].x;this.y=WP[0].y;this.wpIdx=0;
    this.hp=hp;this.maxHp=hp;this.speed=speed;
    this.alive=true;this.isBoss=isBoss;
    this.wobble=Math.random()*Math.PI*2;this.hitFlash=0;
    this.r=isBoss?28:18;
  }
  update(dt){
    if(!this.alive)return;
    this.wobble+=dt*(this.isBoss?2:4);
    if(this.hitFlash>0)this.hitFlash-=dt;
    const tgt=WP[this.wpIdx+1];if(!tgt)return;
    const dx=tgt.x-this.x,dy=tgt.y-this.y,dist=Math.hypot(dx,dy);
    const speedMul=gs.globalSlowTimer>0?0.42:1;
    const move=this.speed*speedMul*dt;
    if(move>=dist){
      this.x=tgt.x;this.y=tgt.y;this.wpIdx++;
      if(this.wpIdx>=WP.length-1){
        this.alive=false;
        gs.lives=Math.max(0,gs.lives-(this.isBoss?2:1));
        if(gs.lives<=0)gs.phase='lose';
      }
    }else{this.x+=(dx/dist)*move;this.y+=(dy/dist)*move;}
  }
  hit(dmg){
    this.hp=Math.max(0,this.hp-dmg);this.hitFlash=0.18;
    if(this.hp===0){
      this.alive=false;gs.coins+=this.isBoss?30:5;
      maybeDropLoot(this);
      if(this.isBoss&&gs.phase!=='chest'&&gs.phase!=='chestIntro'&&gs.phase!=='heroDeploy')showChestIntro();
      burst(this.x,this.y,this.isBoss?['#ff4488','#ff8800','#ffff00','#ff00ff','#fff']:['#44ee88','#88ffaa','#ffff44','#fff','#aaffff'],this.isBoss?26:14);
    }
  }
  draw(){
    if(!this.alive)return;
    const bob=Math.sin(this.wobble)*(this.isBoss?3:2);
    const x=this.x,y=this.y+bob,r=this.r;
    ctx.save();
    if(this.hitFlash>0)ctx.globalAlpha=0.55+this.hitFlash;
    if(this.isBoss){
      ctx.shadowColor=this.hitFlash>0?'#fff':'#ff2244';ctx.shadowBlur=16;
      ctx.fillStyle=this.hitFlash>0?'#ff8888':'#cc1133';
      ctx.beginPath();ctx.ellipse(x,y,r,r*0.82,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=this.hitFlash>0?'#ffbbbb':'#ff4466';
      ctx.beginPath();ctx.ellipse(x-7,y-8,r*0.48,r*0.35,-0.3,0,Math.PI*2);ctx.fill();
      ctx.restore();
      ctx.save();ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('👑',x,y-r-16);ctx.restore();
      ctx.fillStyle='#ff0';[[-10,0],[10,0]].forEach(([ex,ey])=>{ctx.beginPath();ctx.arc(x+ex,y+ey-2,6,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='#000';[[-10,0],[10,0]].forEach(([ex,ey])=>{ctx.beginPath();ctx.arc(x+ex,y+ey-2,3,0,Math.PI*2);ctx.fill();});
    }else{
      ctx.shadowColor=this.hitFlash>0?'#ff4444':'#00ff66';ctx.shadowBlur=8;
      ctx.fillStyle=this.hitFlash>0?'#ff6666':'#33cc55';
      ctx.beginPath();ctx.ellipse(x,y,r,r*0.82,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=this.hitFlash>0?'#ffaaaa':'#66ff99';
      ctx.beginPath();ctx.ellipse(x-5,y-5,r*0.5,r*0.38,-0.4,0,Math.PI*2);ctx.fill();
      ctx.restore();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(x-6,y-4,4.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+6,y-4,4.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(x-5,y-4,2.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+7,y-4,2.2,0,Math.PI*2);ctx.fill();
    }
    // HP bar
    const bw=this.isBoss?52:36,bh=this.isBoss?7:5;
    const bx=x-bw/2,by=y-r-14;
    ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,bh);
    const pct=this.hp/this.maxHp;
    ctx.fillStyle=pct>0.5?'#44ee55':pct>0.25?'#eeee44':'#ee4444';
    ctx.fillRect(bx,by,bw*pct,bh);
  }
}

// TOWER  — auto-fires independently; question system is separate
// ════════════════════════════════════════════════════════
class Tower{
  constructor(gx,gy,type){
    this.gx=gx;this.gy=gy;
    this.x=gx*CELL+CELL/2;this.y=gy*CELL+CELL/2;
    this.type=type;this.d=TOWER_DEFS[type];
    this.cooldown=0;this.pulse=0;this.firing=0;
    this.upgrades={damage:0,speed:0,range:0};
  }
  get effDamage()  {
    return Math.round(this.d.damage+this.upgrades.damage*UPG_DMG);
  }
  get effRange()   {
    return Math.round(this.d.range + this.upgrades.range*UPG_RNG);
  }
  get effCD()      {
    return Math.max(0.22,this.d.atkCD-this.upgrades.speed*UPG_SPD);
  }

  update(dt){
    if(this.cooldown>0)this.cooldown=Math.max(0,this.cooldown-dt);
    this.pulse+=dt*1.5;
    if(this.firing>0)this.firing=Math.max(0,this.firing-dt);
    // Auto-fire when ready
    if(this.cooldown<=0){
      const tgt=this.getTarget();
      if(tgt)this.fire(tgt);
    }
  }
  getTarget(){
    let best=null,bestIdx=-1;
    for(const e of enemies){
      if(!e.alive)continue;
      if(Math.hypot(e.x-this.x,e.y-this.y)<=this.effRange&&e.wpIdx>bestIdx){best=e;bestIdx=e.wpIdx;}
    }
    return best;
  }
  fire(tgt){
    if(!tgt||!tgt.alive)return;
    this.firing=0.35;
    if(this.d.aoe){
      for(const e of enemies){if(!e.alive)continue;if(Math.hypot(e.x-this.x,e.y-this.y)<=this.effRange)bullets.push(new Bullet(this.x,this.y,e,this.effDamage,this.d.bClr,this.d.bSpd));}
    }else{
      bullets.push(new Bullet(this.x,this.y,tgt,this.effDamage,this.d.bClr,this.d.bSpd));
    }
    this.cooldown=this.effCD;
  }
  draw(){
    const d=this.d,s=1+Math.sin(this.pulse)*0.04;
    ctx.save();ctx.translate(this.x,this.y);ctx.scale(s,s);

    // ── Cooldown progress ring ──
    const readyPct=this.effCD>0?Math.min(1,1-this.cooldown/this.effCD):1;
    // background ring
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=5;
    ctx.beginPath();ctx.arc(0,-2,21,0,Math.PI*2);ctx.stroke();
    // progress arc (green=ready, yellow=charging)
    if(readyPct>0){
      ctx.strokeStyle=readyPct>=1?'#44ff88':'#ffcc44';
      ctx.lineWidth=5;
      if(readyPct>=1){ctx.shadowColor='#44ff88';ctx.shadowBlur=10;}
      ctx.beginPath();ctx.arc(0,-2,21,-Math.PI/2,-Math.PI/2+Math.PI*2*readyPct);ctx.stroke();
      ctx.shadowBlur=0;
    }

    // Attack flash ring
    if(this.firing>0){
      const f=1-this.firing/0.35;
      ctx.globalAlpha=(1-f)*0.75;ctx.strokeStyle=d.bClr;ctx.lineWidth=4;
      ctx.shadowColor=d.bClr;ctx.shadowBlur=16;
      ctx.beginPath();ctx.arc(0,-2,20+f*28,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;ctx.shadowBlur=0;
    }

    // Shadow, base, body, emoji
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,14,18,7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#44446a';ctx.beginPath();ctx.arc(0,2,18,0,Math.PI*2);ctx.fill();
    ctx.shadowColor=d.color;ctx.shadowBlur=this.firing>0?22:10;
    ctx.fillStyle=this.firing>0?'#ffffff':d.color;
    ctx.beginPath();ctx.arc(0,-2,15,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.emoji,0,-1);

    // Total upgrade stars
    const tot=this.upgrades.damage+this.upgrades.speed+this.upgrades.range;
    if(tot>0){
      ctx.font='bold 9px sans-serif';ctx.fillStyle='#ffd700';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('★'.repeat(Math.min(tot,9)),0,-23);
    }
    ctx.restore();
  }
}

// BULLET
// ════════════════════════════════════════════════════════
class Bullet{
  constructor(x,y,target,dmg,color,speed,opts={}){
    Object.assign(this,{x,y,target,dmg,color,speed,alive:true,opts});
  }
  update(dt){
    if(!this.alive)return;
    if(!this.target.alive){this.alive=false;return;}
    const dx=this.target.x-this.x,dy=this.target.y-this.y,dist=Math.hypot(dx,dy),move=this.speed*dt;
    if(move>=dist){
      this.target.hit(this.dmg);
      if(this.opts.impactColors)burst(this.target.x,this.target.y,this.opts.impactColors,this.opts.impactCount||10);
      this.alive=false;
    }
    else{this.x+=(dx/dist)*move;this.y+=(dy/dist)*move;}
  }
  draw(){
    if(!this.alive)return;
    const radius=this.opts.radius||6;
    ctx.save();
    ctx.fillStyle=this.color;
    ctx.shadowColor=this.color;
    ctx.shadowBlur=this.opts.glow||10;
    ctx.beginPath();ctx.arc(this.x,this.y,radius,0,Math.PI*2);ctx.fill();
    if(this.opts.trailColor){
      ctx.globalAlpha=0.55;
      ctx.strokeStyle=this.opts.trailColor;
      ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.target.x,this.target.y);ctx.stroke();
    }
    ctx.restore();
  }
}

let gs, enemies, towers, bullets;
let selectedTower=null;
let selectedHero=null;
let chestSt={active:false,question:null,timer:0,correct:0,total:0};
let lootChests=[];
let mousePos={x:CW/2,y:CH/2};

function setMapNotice(text,duration=3){
  gs.mapNotice={text,timer:duration,duration};
}

function makeHeroByTier(tier){
  const defs={
    1:{id:'fox',name:'狐狸勇者',emoji:'🦊',skill:'全範圍暫停怪物 5 秒'},
    2:{id:'rhino',name:'犀牛勇者',emoji:'🦏',skill:'全範圍緩速怪物 5 秒'},
    3:{id:'lion',name:'獅子勇者',emoji:'🦁',skill:'全範圍攻擊所有怪物 20% 血量'},
  };
  return {tier, ...defs[tier], attrs:{attack:0,range:0,speed:0}, skillCd:0, attackCd:0, deployed:false,x:0,y:0,gx:-1,gy:-1};
}

function heroFootprintCells(hero){
  if(!hero||hero.gx<0||hero.gy<0)return [];
  return [
    [hero.gx,hero.gy],
    [hero.gx+1,hero.gy],
    [hero.gx,hero.gy+1],
    [hero.gx+1,hero.gy+1],
  ];
}

function heroEffRange(hero){
  return 72 + hero.attrs.range*UPG_RNG;
}

function heroEffDamage(hero){
  return hero.tier*2 + 2 + hero.attrs.attack*2;
}

function heroEffCD(hero){
  return Math.max(0.4,1.6 - hero.attrs.speed*0.14);
}

function spawnLootChest(x,y){
  lootChests.push({
    x,y,
    reward:makeLootReward(),
    pulse:Math.random()*Math.PI*2,
    bob:Math.random()*Math.PI*2,
    r:18,
  });
  setMapNotice('有寶箱掉落，點擊即可查看內容');
}

function maybeDropLoot(enemy){
  if(gs.debugForcedLoot||Math.random()<LOOT_DROP_RATE)spawnLootChest(enemy.x,enemy.y);
}

function updateLootChests(dt){
  for(const chest of lootChests){
    chest.pulse+=dt*3;
    chest.bob+=dt*2.2;
  }
}

function drawLootChests(){
  for(const chest of lootChests){
    const bob=Math.sin(chest.bob)*4;
    const scale=1+Math.sin(chest.pulse)*0.06;
    ctx.save();
    ctx.translate(chest.x,chest.y+bob);
    ctx.scale(scale,scale);
    ctx.shadowColor='#ffd54a';
    ctx.shadowBlur=16;
    ctx.fillStyle='#8a4f1c';
    ctx.strokeStyle='#ffd54a';
    ctx.lineWidth=3;
    ctx.beginPath();ctx.roundRect(-16,-11,32,24,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#ffd54a';
    ctx.fillRect(-16,-1,32,5);
    ctx.fillRect(-2,-11,4,24);
    ctx.fillStyle='#fff3b0';
    ctx.font='16px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('🎁',0,-24);
    ctx.restore();
  }
}

function lootChestAt(mx,my){
  for(let i=lootChests.length-1;i>=0;i--){
    const chest=lootChests[i];
    const bob=Math.sin(chest.bob)*4;
    if(Math.hypot(mx-chest.x,my-(chest.y+bob))<=chest.r)return {chest,index:i};
  }
  return null;
}

function claimLootChest(index){
  const [chest]=lootChests.splice(index,1);
  if(!chest)return;
  const reward=chest.reward;
  if(reward.kind==='upgrade'&&!hasLootUpgradeTarget(reward.attr))reward.fallbackCoins=50;
  if(reward.kind==='maxCat'&&!hasMaxCatPlacement())reward.fallbackCoins=80;
  reward.sourceX=chest.x;
  reward.sourceY=chest.y;
  gs.activeLoot=reward;
  gs.phaseBeforeLoot=gs.phase;
  gs.phase='lootDialog';
  closePanel();
  burst(chest.x,chest.y,['#ffd54a','#fff3a8','#ffffff'],22);
  setMapNotice(`寶箱內容：${lootRewardText(reward)}`);
  showLootDialog(reward);
}

function getHeroTarget(hero){
  let best=null,bestIdx=-1;
  for(const e of enemies){
    if(!e.alive)continue;
    if(Math.hypot(e.x-hero.x,e.y-hero.y)<=heroEffRange(hero)&&e.wpIdx>=bestIdx){best=e;bestIdx=e.wpIdx;}
  }
  return best;
}

function fireHeroAttack(hero,target){
  if(!target||!target.alive)return;
  const styles={
    fox:{color:'#9fe7ff', trailColor:'rgba(159,231,255,0.65)', impactColors:['#c8f8ff','#9fe7ff','#ecffff'], radius:7, glow:16, speed:360},
    rhino:{color:'#d6c7ff', trailColor:'rgba(214,199,255,0.65)', impactColors:['#d6c7ff','#8f72ff','#ffffff'], radius:9, glow:20, speed:300},
    lion:{color:'#ffb347', trailColor:'rgba(255,179,71,0.7)', impactColors:['#ffcf66','#ff8a00','#fff1b8'], radius:8, glow:18, speed:380},
  };
  const style=styles[hero.id]||styles.fox;
  bullets.push(new Bullet(hero.x,hero.y,target,heroEffDamage(hero),style.color,style.speed,{
    radius:style.radius,
    glow:style.glow,
    trailColor:style.trailColor,
    impactColors:style.impactColors,
    impactCount:hero.id==='rhino'?16:12,
  }));
  burst(hero.x,hero.y,style.impactColors,hero.id==='lion'?8:6);
  hero.attackCd=heroEffCD(hero);
}

function updateHeroCombat(dt){
  const hero=gs.hero;
  if(!hero||!hero.deployed)return;
  if(hero.attackCd>0)hero.attackCd=Math.max(0,hero.attackCd-dt);
  if(gs.phase!=='wave'&&gs.phase!=='between')return;
  if(gs.globalPauseTimer>0)return;
  if(hero.attackCd>0)return;
  const target=getHeroTarget(hero);
  if(target)fireHeroAttack(hero,target);
}

function heroCanPlaceAt(gx,gy){
  if(gx<0||gy<0||gx>=Math.floor(CW/CELL)-1||gy>=Math.floor((CH-Q_BAR_H)/CELL)-1)return false;
  const cells=[[gx,gy],[gx+1,gy],[gx,gy+1],[gx+1,gy+1]];
  return cells.every(([cx,cy])=>{
    const px=cx*CELL+CELL/2,py=cy*CELL+CELL/2;
    return py>=HUD && py<=CH-Q_BAR_H && !onPath(px,py) && !towers.some(t=>t.gx===cx&&t.gy===cy) && !(gs.hero&&gs.hero.deployed&&heroFootprintCells(gs.hero).some(([hx,hy])=>hx===cx&&hy===cy));
  });
}

function canPlaceMaxCatAt(gx,gy){
  if(gx<0||gy<0||gx>=Math.floor(CW/CELL)||gy>=Math.floor((CH-Q_BAR_H)/CELL))return false;
  const cx=gx*CELL+CELL/2,cy=gy*CELL+CELL/2;
  const heroBlocked=gs.hero&&gs.hero.deployed&&heroFootprintCells(gs.hero).some(([hx,hy])=>hx===gx&&hy===gy);
  return cy>=HUD+CELL/2 && cy<=CH-Q_BAR_H && !onPath(cx,cy) && !heroBlocked && !towers.some(t=>t.gx===gx&&t.gy===gy);
}

function hasLootUpgradeTarget(attr){
  const towerReady=towers.some(t=>t.upgrades[attr]<MAX_UPG);
  return towerReady;
}

function hasMaxCatPlacement(){
  const maxGX=Math.floor(CW/CELL);
  const maxGY=Math.floor((CH-Q_BAR_H)/CELL);
  for(let gy=0;gy<maxGY;gy++){
    for(let gx=0;gx<maxGX;gx++){
      if(canPlaceMaxCatAt(gx,gy))return true;
    }
  }
  return false;
}

function finishLootUse(nextPhase=gs.phaseBeforeLoot||'wave'){
  gs.activeLoot=null;
  gs.lootMessage='';
  gs.phaseBeforeLoot='wave';
  gs.phase=nextPhase;
  hideOverlay();
}

function useLootUpgradeOnTarget(mx,my){
  const reward=gs.activeLoot;
  if(!reward||reward.kind!=='upgrade')return false;
  const gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);
  const tower=towers.find(t=>t.gx===gx&&t.gy===gy);
  if(tower&&applyTowerUpgrade(tower,reward.attr,1)){
    burst(tower.x,tower.y,['#9fe7ff','#ffd54a','#ffffff'],20);
    finishLootUse();
    return true;
  }
  return false;
}

function placeLootCatTower(gx,gy){
  if(!canPlaceMaxCatAt(gx,gy))return false;
  const tower=new Tower(gx,gy,'cat');
  tower.upgrades.damage=MAX_UPG;
  tower.upgrades.speed=MAX_UPG;
  tower.upgrades.range=MAX_UPG;
  towers.push(tower);
  burst(tower.x,tower.y,['#ffd54a','#fff3a8','#ffffff'],26);
  finishLootUse();
  return true;
}

function useCoinLoot(){
  const reward=gs.activeLoot;
  if(!reward||reward.kind!=='coins')return false;
  gs.coins+=reward.amount;
  showFloatText(reward.sourceX||CW/2,reward.sourceY||HUD+42,`+${reward.amount}`,'#ffd54a');
  burst(reward.sourceX||CW/2,reward.sourceY||HUD+42,['#ffd54a','#fff3a8','#ffffff'],18);
  finishLootUse();
  return true;
}

function confirmLootUse(){
  const reward=gs.activeLoot;
  if(!reward)return;
  if(reward.fallbackCoins){
    gs.coins+=reward.fallbackCoins;
    showFloatText(reward.sourceX||CW/2,reward.sourceY||HUD+42,`+${reward.fallbackCoins}`,'#ffd54a');
    burst(reward.sourceX||CW/2,reward.sourceY||HUD+42,['#ffd54a','#fff3a8','#ffffff'],18);
    setMapNotice(`寶箱內容：改為獲得 ${reward.fallbackCoins} 金幣`);
    finishLootUse();
    return;
  }
  if(reward.kind==='coins'){
    useCoinLoot();
    return;
  }
  gs.lootMessage=reward.kind==='upgrade'
    ? `請點擊任一座塔，使用 ${LOOT_ATTR_LABELS[reward.attr]}升級券`
    : '請點擊地圖空地，部署滿級貓咪塔';
  setMapNotice(`寶箱內容：${lootRewardText(reward)}`);
  hideOverlay();
  gs.phase=reward.kind==='upgrade'?'lootUpgrade':'lootDeployCat';
}

function showLootDialog(reward){
  if(!reward)return;
  const title=reward.kind==='coins'?'🪙 發現金幣寶箱':reward.kind==='upgrade'?'🎟️ 發現升級寶箱':'🐱 發現滿級塔寶箱';
  const detail=reward.fallbackCoins
    ? `目前無法直接使用，按下使用後會改為獲得 ${reward.fallbackCoins} 金幣`
    : lootRewardDetail(reward);
  showOverlay(`
    <h2>${title}</h2>
    <div class="heroCard">
      寶箱內容：<b>${lootRewardText(reward)}</b><br>
      ${detail}
    </div>
    <div class="ctaRow">
      <button id="useLootBtn" class="dlgBtn primary">使用</button>
    </div>
  `);
  const useBtn=document.getElementById('useLootBtn');
  if(useBtn)useBtn.addEventListener('click',()=>confirmLootUse());
}

let qSt={status:'off',question:null,timer:0,waitTimer:0};

function qReset(){qSt={status:'off',question:null,timer:0,waitTimer:0};}
function showOverlay(html){
  const ov=document.getElementById('overlay');
  document.getElementById('dialog').innerHTML=html;
  ov.classList.add('show');
}
function hideOverlay(){document.getElementById('overlay').classList.remove('show');}

function closeControlMenus(){
  document.querySelectorAll('.ctrlMenu').forEach(menu=>menu.classList.remove('show'));
  document.querySelectorAll('.ctrlIconBtn').forEach(btn=>btn.classList.remove('active'));
}

function toggleControlMenu(menuId, btnId){
  const menu=document.getElementById(menuId);
  const btn=document.getElementById(btnId);
  const willOpen=!menu.classList.contains('show');
  closeControlMenus();
  if(willOpen){
    menu.classList.add('show');
    btn.classList.add('active');
  }
}

function applyDifficultyPreset(index,isInit=false){
  const pick=Math.max(1,Math.min(4,index));
  gs.difficulty=pick;
  gs.streak=0;
  document.getElementById('difficultyBadge').textContent=`LV${pick}`;
  document.querySelectorAll('[data-difficulty]').forEach(btn=>{
    const active=Number(btn.dataset.difficulty)===pick;
    btn.classList.toggle('active',active);
  });
}

function pickHeroTierByScore(correct){
  if(correct>=12)return 3;
  if(correct>=8)return 2;
  if(correct>=5)return 1;
  return 0;
}

function chestQuestion(){
  chestSt.question=makeQuestion(gs.difficulty);

  document.getElementById('qExpr').textContent=q.expr;

  document.getElementById('qFeedback').style.color='#9be6ff';
  document.getElementById('qBar').classList.add('show');
}

function finishChestChallenge(){
  chestSt.active=false;
  const tier=pickHeroTierByScore(chestSt.correct);
  const earned=tier?makeHeroByTier(tier):null;
  const replaced=Boolean(earned&&(!gs.hero||earned.tier>gs.hero.tier));
  if(replaced)gs.hero=earned;
  const activeHero=replaced?earned:gs.hero;
  const heroTxt=earned
    ? replaced
      ? `${earned.emoji} ${earned.name}`
      : gs.hero&&gs.hero.id===earned.id
        ? `${earned.emoji} ${earned.name}（已擁有，保留原勇者）`
        : `${earned.emoji} ${earned.name}（已有更強勇者 ${gs.hero.emoji} ${gs.hero.name}）`
    : '未達門檻，尚未獲得勇者';
  const skillTxt=activeHero?activeHero.skill:'答對 5 題即可獲得狐狸勇者';
  showOverlay(`
    <h2>⏱️ 寶箱挑戰結束</h2>
    <p>完成題數：<b>${chestSt.total}</b>，答對：<b>${chestSt.correct}</b></p>
    <div class="heroCard">
      獲得勇者：<b>${heroTxt}</b><br>
      勇者技能：${skillTxt}
    </div>
    <p>門檻：5題🦊狐狸勇者 / 8題🦏犀牛勇者 / 12題以上🦁獅子勇者</p>
    <div class="ctaRow">
      <button id="deployHeroBtn" class="dlgBtn primary" ${activeHero?'':'disabled style="opacity:.45;cursor:not-allowed"'}>部署勇者</button>
      <button id="skipDeployBtn" class="dlgBtn">稍後部署</button>
    </div>
  `);
  const deployBtn=document.getElementById('deployHeroBtn');
  if(deployBtn&&!deployBtn.disabled){
    deployBtn.addEventListener('click',()=>{
      hideOverlay();
      gs.phase='heroDeploy';
    });
  }
  document.getElementById('skipDeployBtn').addEventListener('click',()=>{
    hideOverlay();
    gs.phase=gs.phaseBeforeChest;
  });
  document.getElementById('qLabel').innerHTML=`💡LV${gs.difficulty}<br>答題賺幣`;
  qReset();
}

function qStart(){
  qSt.status='active';
  qSt.question=makeQuestion(gs.difficulty);
  qSt.timer=Q_SECS;
  document.getElementById('qLabel').innerHTML=`💡LV${gs.difficulty}<br>答題賺幣`;
  const q=qSt.question;
  document.getElementById('qExpr').textContent=q.expr;
  const btns=document.querySelectorAll('.qBtn');
  btns.forEach((b,i)=>{b.textContent=q.choices[i];b.className='qBtn';b.disabled=false;});
  document.getElementById('qFeedback').textContent='';
  document.getElementById('qTimerBar').style.width='100%';
  document.getElementById('qBar').classList.add('show');
}

function qAnswer(choiceIdx){
  if(chestSt.active){
    const correct=choiceIdx===chestSt.question.ci;
    chestSt.total++;
    if(correct)chestSt.correct++;
    document.getElementById('qFeedback').textContent=`${correct?'✅':'❌'} 答對 ${chestSt.correct} / ${chestSt.total}`;
    chestQuestion();
    return;
  }
  if(qSt.status!=='active')return;
  const correct=choiceIdx===qSt.question.ci;
  const btns=document.querySelectorAll('.qBtn');
  btns.forEach(b=>b.disabled=true);
  btns[qSt.question.ci].classList.add('correct');
  if(!correct&&choiceIdx>=0)btns[choiceIdx].classList.add('wrong');

  if(correct){
    const meta=getQuestionLevelMeta(gs.difficulty);
    const bonus=meta.reward;
    gs.coins+=bonus;gs.streak++;
    if(gs.difficulty<4&&gs.streak>=meta.goal){
      gs.difficulty++;
      gs.streak=0;
      applyDifficultyPreset(gs.difficulty);
      document.getElementById('qFeedback').textContent=`⬆️ 升到 LV${gs.difficulty}！本題 +${bonus} 金幣`;
    }else{
      if(gs.difficulty===4)gs.streak=Math.min(gs.streak,meta.goal);
      document.getElementById('qFeedback').textContent=`✅ ＋${bonus} 金幣！`;
    }
    document.getElementById('qFeedback').style.color='#66ff99';
    qSt.waitTimer=0.65;
  }else{
    gs.streak=0;
    document.getElementById('qFeedback').textContent='💪 再試一次！';
    document.getElementById('qFeedback').style.color='#ffaa44';
    qSt.waitTimer=1.1;
  }
  qSt.status='wait';
}

function updateQuestions(dt){
  if(chestSt.active){
    chestSt.timer=Math.max(0,chestSt.timer-dt);
    document.getElementById('qTimerBar').style.width=(chestSt.timer/12*100)+'%';
    if(chestSt.timer<=0)finishChestChallenge();
    return;
  }
  const active=gs.phase==='wave'||gs.phase==='between';
  if(!active){
    if(qSt.status!=='off'){qReset();document.getElementById('qBar').classList.remove('show');}
    return;
  }
  if(qSt.status==='off'){qStart();return;}
  if(qSt.status==='active'){
    qSt.timer-=dt;
    document.getElementById('qTimerBar').style.width=(Math.max(0,qSt.timer/Q_SECS)*100)+'%';
    if(qSt.timer<=0)qAnswer(-1); // timeout = wrong
    return;
  }
  if(qSt.status==='wait'){
    qSt.waitTimer-=dt;
    if(qSt.waitTimer<=0)qStart();
  }
}

document.querySelectorAll('.qBtn').forEach((btn,i)=>btn.addEventListener('click',()=>qAnswer(i)));

function openUpgradeMenu(tower,px,py){
  selectedTower=tower;
  selectedHero=null;
  panelTarget={type:'upgrade',tower};
  const panel=document.getElementById('panel');

  function render(){
    const d=tower.d,u=tower.upgrades;
    const rows=[
      {key:'damage', label:'傷害', icon:'⚔️',
       curVal:`${tower.effDamage}`,
       nextVal:`${tower.effDamage+UPG_DMG}`},
      {key:'speed',  label:'速度', icon:'🏃',
       curVal:`${(1/tower.effCD).toFixed(2)}/s`,
       nextVal:u.speed<MAX_UPG?`${(1/Math.max(0.4,tower.effCD-UPG_SPD)).toFixed(2)}/s`:'MAX'},
      {key:'range',  label:'射程', icon:'🎯',
       curVal:`${tower.effRange}`,
       nextVal:`${tower.effRange+UPG_RNG}`},
    ];
    let html=`<h3>${d.emoji} ${d.name} 升級</h3>`;
    for(const row of rows){
      const lv=u[row.key],atMax=lv>=MAX_UPG;
      const cost=atMax?null:UPG_COST[lv];
      const canAfford=!atMax&&gs.coins>=cost;
      const btnCls=atMax?'maxed':!canAfford?'poor':'';
      html+=`<div class="upRow">
        <span class="upAttr">${row.icon} ${row.label}</span>
        <span class="upIcons">${upIcons(row.key,lv)}</span>
        <button class="upBtn ${btnCls}" data-attr="${row.key}">${atMax?'最高':'🪙 '+cost}</button>
      </div>`;
    }
    html+=`<div class="bOpt cancel" data-cancel style="margin-top:6px">✕ 關閉</div>`;
    panel.innerHTML=html;
    panel.querySelectorAll('.upBtn:not(.maxed):not(.poor)').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const attr=btn.dataset.attr,lv=tower.upgrades[attr];
        if(lv>=MAX_UPG)return;const cost=UPG_COST[lv];
        if(gs.coins<cost)return;
        gs.coins-=cost;tower.upgrades[attr]++;render();
      });
    });
    panel.querySelector('[data-cancel]').addEventListener('click',e=>{e.stopPropagation();closePanel();});
  }
  render();
  posPanel(panel,px,py,240,175);panel.classList.add('show');
}

function startWave(idx){
  gs.wave=idx;gs.phase='wave';gs.spawned=0;gs.spawnTimer=0.8;gs.wcfg=getWaveConfig(idx);
}
function updateSpawn(dt){
  if(gs.phase!=='wave')return;
  const cfg=gs.wcfg;
  gs.spawnTimer-=dt;
  if(gs.spawnTimer<=0&&gs.spawned<cfg.totalCount){
    if(cfg.isBoss){enemies.push(gs.spawned===0?new Enemy(cfg.bossHp,cfg.bossSpeed,true):new Enemy(cfg.minionHp,cfg.minionSpeed,false));}
    else enemies.push(new Enemy(cfg.hp,cfg.speed,false));
    gs.spawned++;gs.spawnTimer=cfg.interval;
  }
  if(gs.spawned>=cfg.totalCount&&enemies.every(e=>!e.alive)){
    gs.phase='between';gs.betweenTimer=3.5;
    gs.lastWaveReward=Math.floor(50+gs.wave*5+(cfg.isBoss?80:0));
    gs.coins+=gs.lastWaveReward;
  }
}

let hoverCell=null;

function drawBg(){
  ctx.fillStyle='#3a6b35';ctx.fillRect(0,HUD,CW,CH-HUD);
  ctx.fillStyle='rgba(0,0,0,0.05)';
  for(let y=HUD;y<CH;y+=20)if(((y-HUD)/20)%2===0)ctx.fillRect(0,y,CW,20);
  const trees=[{x:60,y:90},{x:120,y:80},{x:680,y:90},{x:740,y:75},{x:340,y:80},{x:400,y:295},{x:460,y:295},{x:60,y:385},{x:740,y:295}];
  for(const{x,y}of trees){ctx.save();ctx.font='28px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=0.6;ctx.fillText('🌲',x,y+HUD);ctx.restore();}
}

function drawPath(){
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  [[62,'rgba(0,0,0,0.3)'],[54,'#b8904a'],[44,'#ccaa66']].forEach(([lw,sc])=>{
    ctx.strokeStyle=sc;ctx.lineWidth=lw;
    ctx.beginPath();WP.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();
  });
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=2;ctx.setLineDash([12,18]);
  ctx.beginPath();WP.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,80,80,0.8)';ctx.font='bold 16px sans-serif';
  ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('▶ 怪獸入口',8,200);
  ctx.restore();
}

function drawHoverCell(){
  if(!hoverCell)return;
  const{gx,gy}=hoverCell,cx=gx*CELL+CELL/2,cy=gy*CELL+CELL/2;
  if(gs.phase==='heroDeploy'){
    const canPlace=heroCanPlaceAt(gx,gy);
    const cells=[[gx,gy],[gx+1,gy],[gx,gy+1],[gx+1,gy+1]];
    ctx.save();
    for(const [hx,hy] of cells){
      if(hx<0||hy<0||hx>=Math.floor(CW/CELL)||hy>=Math.floor(CH/CELL))continue;
      ctx.fillStyle=canPlace?'rgba(90,255,140,0.18)':'rgba(255,90,90,0.2)';
      ctx.strokeStyle=canPlace?'rgba(120,255,170,0.9)':'rgba(255,120,120,0.9)';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(hx*CELL+2,hy*CELL+2,CELL-4,CELL-4,6);ctx.fill();ctx.stroke();
    }
    ctx.restore();
    return;
  }
  if(gs.phase==='lootDeployCat'){
    const canPlace=canPlaceMaxCatAt(gx,gy);
    ctx.save();
    ctx.fillStyle=canPlace?'rgba(255,215,74,0.2)':'rgba(255,90,90,0.2)';
    ctx.strokeStyle=canPlace?'rgba(255,236,140,0.95)':'rgba(255,120,120,0.9)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(gx*CELL+2,gy*CELL+2,CELL-4,CELL-4,6);ctx.fill();ctx.stroke();
    ctx.restore();
    return;
  }
  if(cy<HUD+CELL/2||onPath(cx,cy))return;
  const hasTower=towers.some(t=>t.gx===gx&&t.gy===gy);
  const heroBlocked=gs.hero&&gs.hero.deployed&&heroFootprintCells(gs.hero).some(([hx,hy])=>hx===gx&&hy===gy);
  ctx.fillStyle=(hasTower||heroBlocked)?'rgba(255,215,0,0.1)':'rgba(255,255,255,0.15)';
  ctx.beginPath();ctx.roundRect(gx*CELL+2,gy*CELL+2,CELL-4,CELL-4,6);ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,0.4)';ctx.lineWidth=1;ctx.stroke();
}

function drawHUD(){
  ctx.fillStyle='#12122a';ctx.fillRect(0,0,CW,HUD);
  ctx.fillStyle='#2a2a55';ctx.fillRect(0,HUD-3,CW,3);
  ctx.save();ctx.textBaseline='middle';ctx.font='bold 16px sans-serif';
  let h='';for(let i=0;i<gs.maxLives;i++)h+=i<gs.lives?'❤️ ':'🖤 ';

      gs.coins-=cost;hero.attrs[key]++;renderHero();
    }));
    const sk=panel.querySelector('[data-skill]');
    if(sk&&!sk.disabled)sk.addEventListener('click',e=>{e.stopPropagation();triggerHeroSkill();renderHero();});
    panel.querySelector('[data-cancel]').addEventListener('click',e=>{e.stopPropagation();closePanel();});
  }
  renderHero();
  posPanel(panel,mx,my,262,235);panel.classList.add('show');
}

function drawModal(emoji,title,sub,hint){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,CW,CH);
  const bx=CW/2-210,by=CH/2-130,bw=420,bh=260;
  ctx.fillStyle='#1e1e4e';ctx.strokeStyle='#ffd700';ctx.lineWidth=3;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,22);ctx.fill();ctx.stroke();
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='48px serif';ctx.fillText(emoji,CW/2,by+55);
  ctx.font='bold 30px sans-serif';ctx.fillStyle='#ffd700';ctx.fillText(title,CW/2,by+110);
  ctx.font='19px sans-serif';ctx.fillStyle='#ccccff';ctx.fillText(sub,CW/2,by+155);
  ctx.font='bold 15px sans-serif';ctx.fillStyle='#aaffaa';ctx.fillText(hint,CW/2,by+210);
  ctx.restore();
}

function drawCornerHint(emoji,title,sub,hint){
  const bw=290,bh=116,bx=16,by=HUD+14;
  ctx.save();
  ctx.fillStyle='rgba(14,14,40,0.88)';
  ctx.strokeStyle='#ffd700';
  ctx.lineWidth=3;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,18);ctx.fill();ctx.stroke();
  ctx.textBaseline='middle';
  ctx.textAlign='left';
  ctx.font='34px serif';
  ctx.fillStyle='#fff';
  ctx.fillText(emoji,bx+18,by+28);
  ctx.font='bold 22px sans-serif';
  ctx.fillStyle='#ffd700';
  ctx.fillText(title,bx+66,by+28);
  ctx.font='15px sans-serif';
  ctx.fillStyle='#d9dcff';
  ctx.fillText(sub,bx+18,by+66);
  ctx.font='bold 13px sans-serif';
  ctx.fillStyle='#aaffaa';
  ctx.fillText(hint,bx+18,by+92);
  ctx.restore();
}

function drawMapNotice(){
  if(!gs.mapNotice||gs.mapNotice.timer<=0)return;
  const pct=Math.max(0,Math.min(1,gs.mapNotice.timer/gs.mapNotice.duration));
  const bw=304,bh=40,bx=CW-bw-16,by=CH-Q_BAR_H-bh-14;
  ctx.save();
  ctx.globalAlpha=0.55+0.45*pct;
  ctx.fillStyle='rgba(14,14,40,0.94)';
  ctx.strokeStyle='#ffd700';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,18);ctx.fill();ctx.stroke();
  ctx.textBaseline='middle';
  ctx.textAlign='left';
  ctx.font='bold 14px sans-serif';
  ctx.fillStyle='#ffe680';
  ctx.fillText(`🎁 ${gs.mapNotice.text}`,bx+14,by+21);
  ctx.restore();
}

function setSpeed(v){
  gs.gameSpeed=v;
  document.getElementById('speedBadge').textContent=`${v.toFixed(1)}x`;
  document.querySelectorAll('[data-speed]').forEach(btn=>{
    const active=Number(btn.dataset.speed)===v;
    btn.classList.toggle('active',active);
  });
}

// ════════════════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════════════════
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.1);lastTs=ts;
  const simDt=dt*gs.gameSpeed;
  updateLootChests(dt);
  for(const t of floatTexts)t.update(dt);
  floatTexts=floatTexts.filter(t=>t.life>0);
  if(gs.mapNotice){
    gs.mapNotice.timer-=dt;
    if(gs.mapNotice.timer<=0)gs.mapNotice=null;
  }

  if(gs.hero&&gs.hero.skillCd>0)gs.hero.skillCd=Math.max(0,gs.hero.skillCd-simDt);
  if(gs.globalPauseTimer>0)gs.globalPauseTimer=Math.max(0,gs.globalPauseTimer-simDt);
  if(gs.globalSlowTimer>0)gs.globalSlowTimer=Math.max(0,gs.globalSlowTimer-simDt);
  updateHeroCombat(simDt);

  if(gs.phase==='wave'||gs.phase==='between'||gs.phase==='chest'){
    if(gs.phase!=='chest'){
      if(gs.globalPauseTimer<=0){
        for(const e of enemies) e.update(simDt);
      }
      for(const t of towers) t.update(simDt);
      for(const b of bullets) b.update(simDt);
    }
    for(const p of particles)p.update(simDt);
    bullets=bullets.filter(b=>b.alive);
    particles=particles.filter(p=>p.life>0);
    enemies=enemies.filter(e=>e.alive);
    if(gs.phase!=='chest')updateSpawn(simDt);
    if(gs.phase==='between'){
      gs.betweenTimer-=simDt;
      if(gs.betweenTimer<=0)startWave(gs.wave+1);
    }
  }
  updateQuestions(dt);

  // ── RENDER ──
  ctx.clearRect(0,0,CW,CH);
  drawBg();drawPath();drawHoverCell();
  if(selectedTower){
    ctx.save();ctx.globalAlpha=0.16;ctx.fillStyle=selectedTower.d.color;
    ctx.beginPath();ctx.arc(selectedTower.x,selectedTower.y,selectedTower.effRange,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  if(selectedHero&&selectedHero.deployed){
    ctx.save();ctx.globalAlpha=0.14;ctx.fillStyle='#ffd54f';
    ctx.beginPath();ctx.arc(selectedHero.x,selectedHero.y,heroEffRange(selectedHero),0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  for(const e of enemies)  e.draw();
  drawLootChests();
  drawHero();
  for(const t of towers)   t.draw();
  for(const b of bullets)  b.draw();
  for(const p of particles)p.draw();
  for(const t of floatTexts)t.draw();
  drawLootCursor();
  drawHUD();

  if(gs.phase==='between'){
    const nextIdx=gs.wave+1,nextBoss=isBossWave(nextIdx),t=Math.ceil(gs.betweenTimer);
    ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 22px sans-serif';
    ctx.fillStyle=nextBoss?'#ff8888':'#ffd700';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=12;
    ctx.fillText(nextBoss?`⚠️ 大魔王即將來臨！Wave ${nextIdx+1}  ↓ ${t}s`:`✨ 通關！＋${gs.lastWaveReward} 金幣　下一波：${t}s`,CW/2,CH/2-60);
    ctx.restore();
  }
  if(gs.phase==='chest'){
    drawModal('🎁','寶箱限時挑戰中！',`剩餘 ${chestSt.timer.toFixed(1)} 秒，答對：${chestSt.correct}`,'快速答題爭取勇者');
  }
  if(gs.phase==='heroDeploy'){
    drawCornerHint(gs.hero?gs.hero.emoji:'🧭','部署勇者中','請點擊地圖空地放置勇者','部署完成後自動恢復遊戲');
  }
  if(gs.phase==='lootDeployCat'){
    drawCornerHint('🐱','立即部署滿級貓咪塔','三種屬性都已滿級',gs.lootMessage||'請點擊地圖空地放置');
  }
  drawMapNotice();
  if(gs.phase==='win'){const st='⭐'.repeat(Math.max(1,gs.lives));drawModal('🎉','恭喜通關！',`${st}  金幣：🪙 ${gs.coins}`,'點擊重新遊玩');}
  if(gs.phase==='lose')drawModal('💀','遊戲結束！','怪獸突破了防線⋯','點擊重新遊玩');
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════════════════
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mousePos={x:e.clientX-r.left,y:e.clientY-r.top};
  hoverCell={gx:Math.floor((e.clientX-r.left)/CELL),gy:Math.floor((e.clientY-r.top)/CELL)};
});
canvas.addEventListener('mouseleave',()=>{hoverCell=null;});
document.querySelectorAll('[data-speed]').forEach(btn=>btn.addEventListener('click',e=>{
  e.stopPropagation();
  const v=Number(btn.dataset.speed)||1;
  setSpeed(v);
  closeControlMenus();
}));
document.querySelectorAll('[data-difficulty]').forEach(btn=>btn.addEventListener('click',e=>{
  e.stopPropagation();
  const pick=Number(btn.dataset.difficulty)||1;
  applyDifficultyPreset(pick);
  closeControlMenus();
  if(!chestSt.active&&(gs.phase==='wave'||gs.phase==='between'))qStart();
}));
document.getElementById('speedToggleBtn').addEventListener('click',e=>{
  e.stopPropagation();
  toggleControlMenu('speedMenu','speedToggleBtn');
});
document.getElementById('difficultyToggleBtn').addEventListener('click',e=>{
  e.stopPropagation();
  toggleControlMenu('difficultyMenu','difficultyToggleBtn');
});
document.getElementById('gameControls').addEventListener('click',e=>e.stopPropagation());
document.addEventListener('click',()=>closeControlMenus());
document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  if(e.key==='d'||e.key==='D'){
    gs.debugForcedLoot=!gs.debugForcedLoot;
  }
});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  if(gs.phase==='win'||gs.phase==='lose'){initState();return;}
  if(gs.phase==='lootUpgrade'){
    useLootUpgradeOnTarget(mx,my);
    return;
  }
  if(gs.phase==='lootDeployCat'){
    if(my<HUD||my>CH-Q_BAR_H)return;
    const gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);
    placeLootCatTower(gx,gy);
    return;
  }
  if(gs.phase==='heroDeploy'){
    if(my<HUD||my>CH-Q_BAR_H)return;
    const gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);
    if(!heroCanPlaceAt(gx,gy))return;
    const cx=gx*CELL+CELL,cy=gy*CELL+CELL;
    if(gs.hero){
      gs.hero.gx=gx;gs.hero.gy=gy;gs.hero.x=cx;gs.hero.y=cy;gs.hero.deployed=true;
      gs.phase=gs.phaseBeforeChest;
    }
    return;
  }
  if(gs.phase==='chestIntro')return;
  closeControlMenus();
  const lootHit=lootChestAt(mx,my);
  if(lootHit){claimLootChest(lootHit.index);return;}
  if(heroAt(mx,my)){openHeroMenu(mx,my);return;}
  if(panelTarget){closePanel();return;}
  if(my<HUD||my>CH-Q_BAR_H)return; // ignore HUD and question bar area
  const gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);
  const cx=gx*CELL+CELL/2,cy=gy*CELL+CELL/2;
  const existing=towers.find(t=>t.gx===gx&&t.gy===gy);
  if(existing){openUpgradeMenu(existing,mx,my);return;}
  const heroBlocked=gs.hero&&gs.hero.deployed&&heroFootprintCells(gs.hero).some(([hx,hy])=>hx===gx&&hy===gy);
  if(!onPath(cx,cy)&&!heroBlocked)openBuildMenu(gx,gy,mx,my);
});

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════
initState();
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
